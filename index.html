<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room SMR - Inicio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace; /* Toque informático */
        }

        body {
            background-color: #0a0a0c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Cabecera superior */
        header {
            text-align: center;
            padding: 25px 10px;
            background: #0d0d11;
            border-bottom: 2px solid #1f1f2e;
            z-index: 10;
        }

        header h1 {
            font-size: 2.5rem;
            color: #ffffff;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        header h1 span {
            color: #00ffaa; /* Detalle neón */
        }

        header p {
            color: #888;
            font-size: 1rem;
            margin-top: 5px;
        }

        /* Contenedor de los dos lados */
        .main-container {
            display: flex;
            flex: 1;
            width: 100%;
        }

        /* Estilo común para ambos lados */
        .game-choice {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            text-decoration: none;
            position: relative;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* LADO IZQUIERDO: Minijuego 1 (Cian/Sistemas) */
        .left-side {
            background: linear-gradient(135deg, #07141a 0%, #0c232d 100%);
            border-right: 1px solid #1f1f2e;
        }

        .left-side h2 {
            color: #00e5ff;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        .left-side .btn {
            border: 2px solid #00e5ff;
            color: #00e5ff;
            background: transparent;
        }

        /* LADO DERECHA: Minijuego 2 (Magenta/Redes) */
        .right-side {
            background: linear-gradient(135deg, #18071a 0%, #290c2d 100%);
        }

        .right-side h2 {
            color: #ff007f;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
        }

        .right-side .btn {
            border: 2px solid #ff007f;
            color: #ff007f;
            background: transparent;
        }

        /* Textos de descripción */
        .game-choice p {
            color: #b3b3b3;
            font-size: 1.1rem;
            max-width: 450px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Botones interactivos */
        .btn {
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        /* --- EFECTOS HOVER (Cuando pasas el ratón) --- */
        
        /* El lado seleccionado se expande un poco y brilla */
        .game-choice:hover {
            flex: 1.15; 
        }

        .left-side:hover {
            background: linear-gradient(135deg, #091b24 0%, #123241 100%);
            box-shadow: inset 0 0 50px rgba(0, 229, 255, 0.15);
        }

        .left-side:hover .btn {
            background: #00e5ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
        }

        .right-side:hover {
            background: linear-gradient(135deg, #220a25 0%, #3b1141 100%);
            box-shadow: inset 0 0 50px rgba(255, 0, 127, 0.15);
        }

        .right-side:hover .btn {
            background: #ff007f;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
        }

        /* Diseño para móviles (uno arriba y otro abajo) */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                height: auto;
            }
            .main-container {
                flex-direction: column;
                min-height: calc(100vh - 110px);
            }
            .left-side {
                border-right: none;
                border-bottom: 1px solid #1f1f2e;
            }
            .game-choice {
                padding: 60px 20px;
            }
            .game-choice:hover {
                flex: 1; /* Desactiva la expansión en móvil para que no sea raro */
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Escape Room <span>SMR</span></h1>
        <p>[ Elige tu terminal de acceso ]</p>
    </header>

    <div class="main-container">
        
        <a href="david.html" class="game-choice left-side">
            <div>
                <h2>EL ORDENADOR DE DAVID</h2>
                <p>Comprueba los registros del servidor, repara los fallos del sistema y recupera las credenciales de David antes de que el sistema se bloquee.</p>
                <button class="btn">Acceder al Reto</button>
            </div>
        </a>

        <a href="marcos_buscaminitas.html" class="game-choice right-side">
            <div>
                <h2>BUSCAMINAS</h2>
                <p>Ayuda a Marcos en el amor, resuelve el buscaminas más Español.</p>
                <button class="btn">Acceder al Reto</button>
            </div>
        </a>

    </div>

</body>
</html>
